apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend-deployment-chitchat
  namespace: chitchat
  labels:
    app: frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend
          image: sarvesh9075/chitchat-chat-app-frontend:v1.0.0-c16e86f
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
